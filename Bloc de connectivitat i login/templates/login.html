<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Hospital Blanes - Accés</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Hospital Blanes RIPA</h1>
        <h2>Accés Usuaris</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="dni">DNI / Usuari</label>
                <input type="text" id="dni" name="dni" class="input-field" placeholder="12345678Z" required>
            </div>
            <div class="form-group">
                <label for="password">Contrasenya</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="********" required>
            </div>
            <button type="submit" class="btn">Iniciar Sessió</button>
        </form>
        
        <p class="footer-text">Encara no tens compte? <a href="{{ url_for('registro') }}">Registra't aquí</a></p>
    </div>

    <script>
        document.querySelector('form').onsubmit = function() {
            console.log("Enviant formulari...");
        };
    </script>
</body>
</html>
